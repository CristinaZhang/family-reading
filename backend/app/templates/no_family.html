{% extends "base.html" %}

{% block title %}家庭阅读{% endblock %}

{% block content %}
<div class="empty-state">
  <h2>还没有家庭</h2>
  <p>创建一个家庭，即可开始使用阅读看板。</p>
  <form method="post" action="/web/families" class="create-family-form">
    <input type="text" name="name" value="我家" placeholder="家庭名称">
    <button type="submit" class="btn btn-primary">创建家庭</button>
  </form>
</div>
{% endblock %}
